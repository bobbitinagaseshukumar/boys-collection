<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="STYLEX — Discover luxury men's fashion. Premium shirts, pants, jackets, and more crafted from the finest fabrics. Elevate your wardrobe with timeless elegance." />
    <meta name="keywords" content="luxury men's fashion, premium clothing, designer shirts, stylish pants, men's jackets, STYLEX" />
    <meta name="author" content="STYLEX" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta property="og:title" content="STYLEX | Luxury Men's Fashion" />
    <meta property="og:description" content="Discover luxury men's fashion. Premium shirts, pants, jackets, and more crafted from the finest fabrics." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stylex.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="STYLEX | Luxury Men's Fashion" />
    <meta name="twitter:description" content="Discover luxury men's fashion. Premium shirts, pants, jackets, and more crafted from the finest fabrics." />

    <title>STYLEX | Luxury Men's Fashion</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23d4af37'/><stop offset='100%25' stop-color='%23f5e6a3'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text x='50' y='68' font-family='serif' font-size='60' font-weight='bold' fill='url(%23g)' text-anchor='middle'>S</text></svg>" />

    <!-- Google Fonts: Outfit + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Critical CSS — prevents FOUC */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background-color: #0a0a0f;
        color-scheme: dark;
      }

      body {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        background-color: #0a0a0f;
        color: #e8e8e8;
      }

      #root {
        min-height: 100vh;
        isolation: isolate;
      }

      /* Preloader */
      .preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0a0a0f;
      }

      .preloader-logo {
        font-family: 'Outfit', sans-serif;
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: 0.3em;
        background: linear-gradient(135deg, #d4af37, #f5e6a3, #d4af37);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: pulse-gold 1.5s ease-in-out infinite;
      }

      @keyframes pulse-gold {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preloader">
        <span class="preloader-logo">STYLEX</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
